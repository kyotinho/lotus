<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotus</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas { display: block; }

    #canvas-container { width: 100%; height: 100%; }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease;
    }

    #loader.fade { opacity: 0; pointer-events: none; }

    #loader .title {
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 4px;
      opacity: 0.7;
      margin-bottom: 24px;
    }

    #loader .bar-bg {
      width: 180px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    #loader .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7bbfdd, #b0d8f0);
      transition: width 0.15s;
    }

    #loader .pct {
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      margin-top: 10px;
    }

    #ctrl-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.7);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.2s;
    }
    #ctrl-toggle:hover { background: rgba(255,255,255,0.15); }

    #ctrl-panel {
      position: fixed;
      bottom: 58px;
      right: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 18px 20px 14px;
      width: 240px;
      display: none;
      font-family: 'Courier New', monospace;
    }
    #ctrl-panel.open { display: block; }

    #ctrl-panel .ctrl-title {
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }

    #ctrl-panel .ctrl-row { margin-bottom: 13px; }

    #ctrl-panel .ctrl-label {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    #ctrl-panel .ctrl-label span { color: rgba(255,200,220,0.9); }

    #ctrl-panel input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      border-radius: 1px;
      cursor: pointer;
    }
    #ctrl-panel input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,180,210,0.9);
      cursor: pointer;
    }
    #ctrl-panel input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,180,210,0.9);
      border: none; cursor: pointer;
    }
    #ctrl-panel hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 14px 0;
    }
    #ctrl-panel .ctrl-reset {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 5px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }
    #ctrl-panel .ctrl-reset:hover {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
    }

    #flash-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: black;
      z-index: 500;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none; 
      transition: opacity 0.1s ease-in-out; 
    }

    #flash-text {
      color: white;
      font-family: 'Courier New', Courier, monospace;
      font-size: 2rem;
      text-align: center;
      padding: 20px;
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
    }

    #start-audio-btn {
      position: fixed;
      inset: 0;
      z-index: 998; 
      background: rgba(0,0,0,0.8);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Courier New', monospace;
      font-size: 1.5rem;
      cursor: pointer;
      display: none; 
    }

    /* ENVOLTÓRIO DESLIZANTE DO MUSIC PLAYER */
    #music-wrapper {
      position: fixed;
      top: 20px;
      left: 0;
      z-index: 600;
      display: flex;
      align-items: center;
      /* Esconde o player inteiro fora da tela à esquerda */
      transform: translateX(-100%);
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
      opacity: 0;
      pointer-events: none;
    }

    /* Classe ativada assim que a experiência começa */
    #music-wrapper.started {
      opacity: 1;
      pointer-events: all;
    }

    /* Estado expandido (ao passar o mouse ou clicar) */
    #music-wrapper:hover,
    #music-wrapper.open {
      transform: translateX(20px); /* Traz para a tela com 20px de margem */
    }

    /* O CORPO DO PLAYER */
    #music-player {
      background: rgba(45, 45, 45, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 12px 20px 12px 12px;
      display: flex;
      align-items: center;
      gap: 16px;
      color: white;
      font-family: system-ui, -apple-system, sans-serif;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
    }

    /* A ABA / SETA QUE FICA PARA FORA */
    #music-toggle {
      position: absolute;
      right: -28px; /* Fica colada do lado de fora direito do player */
      top: 0;
      height: 100%;
      width: 28px;
      background: rgba(45, 45, 45, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-left: none;
      border-radius: 0 20px 20px 0;
      color: rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    #music-toggle:hover {
      background: rgba(60, 60, 60, 0.95);
      color: white;
    }

    #music-toggle svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    /* Gira a setinha quando o player estiver aberto */
    #music-wrapper:hover #music-toggle svg,
    #music-wrapper.open #music-toggle svg {
      transform: rotate(180deg);
    }

    #music-player img {
      width: 54px;
      height: 54px;
      border-radius: 12px;
      object-fit: cover;
      background: #222;
    }

    .player-info {
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 180px;
    }

    .player-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 6px;
      letter-spacing: 0.2px;
    }

    .player-timeline {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.6);
    }

    .custom-slider {
      -webkit-appearance: none;
      width: 120px;
      height: 4px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }
    
    .custom-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .custom-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-left: 8px;
    }

    .player-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.8;
      transition: opacity 0.2s;
    }

    .player-btn:hover { opacity: 1; }
    .player-btn svg { fill: currentColor; width: 16px; height: 16px; }
    #btn-play-pause svg { width: 20px; height: 20px; }

    .player-volume {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 10px;
      padding-left: 16px;
      border-left: 1px solid rgba(255,255,255,0.1);
    }

    .player-volume svg { width: 18px; height: 18px; fill: white; opacity: 0.8; }
    #vol-slider { width: 60px; }

  </style>
</head>
<body>

<audio id="bg-music" loop>
  <source src="musica.mp3" type="audio/mpeg">
  Seu navegador não suporta o elemento de áudio.
</audio>

<div id="start-audio-btn">começar</div>

<div id="music-wrapper">
  
  <div id="music-player">
    <img src="capa.jpg" alt="Capa">
    
    <div class="player-info">
      <div class="player-title">musisvnti - 2neural</div>
      <div class="player-timeline">
        <span id="time-current">0:00</span>
        <input type="range" id="seek-slider" class="custom-slider" value="0" min="0" max="100" step="0.1">
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div class="player-controls">
      <button class="player-btn" id="btn-prev" onclick="document.getElementById('bg-music').currentTime = 0;">
        <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
      </button>
      <button class="player-btn" id="btn-play-pause">
        <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="icon-pause" viewBox="0 0 24 24" style="display:none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
    </div>

    <div class="player-volume">
      <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      <input type="range" id="vol-slider" class="custom-slider" value="1" min="0" max="1" step="0.01">
    </div>

    <div id="music-toggle">
      <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
    </div>

  </div>
</div>

<div id="flash-container">
  <div id="flash-text"></div>
</div>

<div id="canvas-container"></div>

<div id="loader">
  <div class="title">Carregando... (●'◡'●)</div>
  <div class="bar-bg">
    <div class="bar-fill" id="loader-bar"></div>
  </div>
  <div class="pct" id="loader-pct">0%</div>
</div>

<button id="ctrl-toggle">CONTROLS</button>

<div id="ctrl-panel">
  <div class="ctrl-title">CONTROLS</div>
  <div class="ctrl-row">
    <div class="ctrl-label">ROTAÇÃO <span id="lbl-rot">1.0×</span></div>
    <input type="range" id="sl-rot" min="0" max="3" step="0.05" value="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label">ABERTURA <span id="lbl-bloom">1.0×</span></div>
    <input type="range" id="sl-bloom" min="0.1" max="4" step="0.05" value="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label">MURCHA <span id="lbl-wilt">1.0×</span></div>
    <input type="range" id="sl-wilt" min="0.1" max="4" step="0.05" value="1">
  </div>
  <hr>
  <div class="ctrl-row">
    <div class="ctrl-label">TROCA DE MODO <span id="lbl-mode">3.5s</span></div>
    <input type="range" id="sl-mode" min="0.3" max="12" step="0.1" value="3.5">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label">FREQ. GLITCH <span id="lbl-glitch">1.0×</span></div>
    <input type="range" id="sl-glitch" min="0.1" max="4" step="0.05" value="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label">ONDAS / OSC. <span id="lbl-wave">1.0×</span></div>
    <input type="range" id="sl-wave" min="0.1" max="4" step="0.05" value="1">
  </div>
  <div class="ctrl-row">
    <div class="ctrl-label">INFLUÊNCIA MOUSE <span id="lbl-mouse">1.0×</span></div>
    <input type="range" id="sl-mouse" min="0" max="4" step="0.05" value="1">
  </div>
  <hr>
  <button class="ctrl-reset" id="btn-reset">RESETAR</button>
</div>

<script>
  // --- MENSAGENS DO FLASH ---
  const mensagensAmor = [
    'Koi no Yokan (恋の予感): A premonição do amor. Pressentimento inexplicável e silencioso, no começo, de que o encontro não foi por acaso e que, inevitavelmente, nós nos apaixonaríamos.',
    'Zweisamkeit: A "solidão a dois". Sensação de paz, intimidade e harmonia absolutas quando estamos juntos e sozinhos, como se o resto do mundo lá fora deixasse de existir e só o universo particular importasse.',
    'Cafuné: O toque de afeto puro. É o gesto físico que diz "eu estou aqui, você está segura e eu cuido de você", acalmarei a sua alma pois eu te amo.',
    'Redamancy: O amor correspondido em sua forma mais completa. O ato de amar inteiramente alguém que te ama na mesma intensidade, uma reciprocidade perfeita e incondicional.',
    'Yuanfen (缘分): O destino que une as pessoas. A força invisível e magnética que fez os caminhos se cruzarem no momento exato. Significa que a conexão já estava escrita muito antes de nos conhecermos.',
    'Sillage (si-yazh): O rastro invisível. O perfume deixado no ar mesmo depois de ter saído do ambiente. A sensação poética de que a presença é tão marcante que continua preenchendo o espaço, mesmo quando ela não está fisicamente ali.',
    'Batticuore: O coração que bate apressado. O sobressalto no peito que se sente toda vez que a pessoa amada está, o jeito especial, o sorriso. Não importa quanto tempo passe, sempre será capaz de tirar o seu fôlego e acelerar o coração.'
  ];

  const tempoMinimoFlash = 500; 
  const tempoMaximoFlash = 15000; 
  const duracaoMensagemNaTela = 6400; 

  const flashContainer = document.getElementById('flash-container');
  const flashText = document.getElementById('flash-text');

  function iniciarFlashes() {
    const tempoAteProximoFlash = Math.random() * (tempoMaximoFlash - tempoMinimoFlash) + tempoMinimoFlash;
    setTimeout(() => {
      const mensagemAleatoria = mensagensAmor[Math.floor(Math.random() * mensagensAmor.length)];
      flashText.innerText = mensagemAleatoria;
      flashContainer.style.opacity = '1';
      setTimeout(() => {
        flashContainer.style.opacity = '0';
        iniciarFlashes(); 
      }, duracaoMensagemNaTela);
    }, tempoAteProximoFlash);
  }

  // --- LÓGICA DE ÁUDIO E DO PLAYER CUSTOMIZADO ---
  const bgMusic = document.getElementById('bg-music');
  const startAudioBtn = document.getElementById('start-audio-btn');
  const musicWrapperUI = document.getElementById('music-wrapper');
  const musicToggleBtn = document.getElementById('music-toggle');
  
  // Elementos do player
  const btnPlayPause = document.getElementById('btn-play-pause');
  const iconPlay = document.getElementById('icon-play');
  const iconPause = document.getElementById('icon-pause');
  const seekSlider = document.getElementById('seek-slider');
  const volSlider = document.getElementById('vol-slider');
  const timeCurrent = document.getElementById('time-current');
  const timeTotal = document.getElementById('time-total');

  let audioIniciado = false;

  // Toggle do Player (Mobile/Clique)
  musicToggleBtn.addEventListener('click', () => {
    musicWrapperUI.classList.toggle('open');
  });

  function formatTime(secs) {
    if (isNaN(secs)) return "0:00";
    const m = Math.floor(secs / 60);
    const s = Math.floor(secs % 60);
    return m + ':' + (s < 10 ? '0' + s : s);
  }

  function updatePlayerProgressBackground(slider) {
    const val = (slider.value - slider.min) / (slider.max - slider.min) * 100;
    slider.style.background = `linear-gradient(to right, white ${val}%, rgba(255,255,255,0.2) ${val}%)`;
  }

  function acionarAberturaAudio() {
    audioIniciado = true;
    startAudioBtn.style.display = 'none';
    
    // Mostra o componente geral
    musicWrapperUI.classList.add('started');
    
    // Abre a gaveta rapidamente para mostrar que existe e fecha sozinha
    musicWrapperUI.classList.add('open');
    setTimeout(() => {
      musicWrapperUI.classList.remove('open');
    }, 4000); 

    iconPlay.style.display = 'none';
    iconPause.style.display = 'block';
  }

  function tentarTocarAudio() {
    if(audioIniciado) return;
    bgMusic.play().then(() => {
      acionarAberturaAudio();
    }).catch(() => {
      startAudioBtn.style.display = 'flex';
    });
  }

  startAudioBtn.addEventListener('click', () => {
    bgMusic.play();
    acionarAberturaAudio();
    iniciarFlashes(); 
  });

  // Play/Pause manual
  btnPlayPause.addEventListener('click', () => {
    if (bgMusic.paused) {
      bgMusic.play();
      iconPlay.style.display = 'none';
      iconPause.style.display = 'block';
    } else {
      bgMusic.pause();
      iconPlay.style.display = 'block';
      iconPause.style.display = 'none';
    }
  });

  bgMusic.addEventListener('loadedmetadata', () => {
    seekSlider.max = bgMusic.duration;
    timeTotal.innerText = formatTime(bgMusic.duration);
  });

  bgMusic.addEventListener('timeupdate', () => {
    seekSlider.value = bgMusic.currentTime;
    timeCurrent.innerText = formatTime(bgMusic.currentTime);
    updatePlayerProgressBackground(seekSlider);
  });

  seekSlider.addEventListener('input', () => {
    bgMusic.currentTime = seekSlider.value;
    updatePlayerProgressBackground(seekSlider);
  });

  volSlider.addEventListener('input', () => {
    bgMusic.volume = volSlider.value;
    updatePlayerProgressBackground(volSlider);
  });
  
  updatePlayerProgressBackground(seekSlider);
  updatePlayerProgressBackground(volSlider);

</script>

<script>
  // Global config object
  const cfg = { rotSpeed: 1.0, bloomSpeed: 1.0, wiltSpeed: 1.0, modeInterval: 3.5, glitchFreq: 1.0, waveSpeed: 1.0, mouseInfluence: 1.0 };
  const defaults = { ...cfg };

  function bindSlider(id, lblId, key, fmt) {
    const sl = document.getElementById(id);
    const lbl = document.getElementById(lblId);
    sl.addEventListener('input', () => { cfg[key] = parseFloat(sl.value); lbl.textContent = fmt(cfg[key]); });
  }

  bindSlider('sl-rot', 'lbl-rot', 'rotSpeed', v => v.toFixed(1) + '×');
  bindSlider('sl-bloom', 'lbl-bloom', 'bloomSpeed', v => v.toFixed(1) + '×');
  bindSlider('sl-wilt', 'lbl-wilt', 'wiltSpeed', v => v.toFixed(1) + '×');
  bindSlider('sl-mode', 'lbl-mode', 'modeInterval', v => v.toFixed(1) + 's');
  bindSlider('sl-glitch', 'lbl-glitch', 'glitchFreq', v => v.toFixed(1) + '×');
  bindSlider('sl-wave', 'lbl-wave', 'waveSpeed', v => v.toFixed(1) + '×');
  bindSlider('sl-mouse', 'lbl-mouse', 'mouseInfluence', v => v.toFixed(1) + '×');

  document.getElementById('btn-reset').addEventListener('click', () => {
    Object.assign(cfg, defaults);
    document.getElementById('sl-rot').value = defaults.rotSpeed;
    document.getElementById('sl-bloom').value = defaults.bloomSpeed;
    document.getElementById('sl-wilt').value = defaults.wiltSpeed;
    document.getElementById('sl-mode').value = defaults.modeInterval;
    document.getElementById('sl-glitch').value = defaults.glitchFreq;
    document.getElementById('sl-wave').value = defaults.waveSpeed;
    document.getElementById('sl-mouse').value = defaults.mouseInfluence;
    document.getElementById('lbl-rot').textContent = defaults.rotSpeed.toFixed(1) + '×';
    document.getElementById('lbl-bloom').textContent = defaults.bloomSpeed.toFixed(1) + '×';
    document.getElementById('lbl-wilt').textContent = defaults.wiltSpeed.toFixed(1) + '×';
    document.getElementById('lbl-mode').textContent = defaults.modeInterval.toFixed(1) + 's';
    document.getElementById('lbl-glitch').textContent = defaults.glitchFreq.toFixed(1) + '×';
    document.getElementById('lbl-wave').textContent = defaults.waveSpeed.toFixed(1) + '×';
    document.getElementById('lbl-mouse').textContent = defaults.mouseInfluence.toFixed(1) + '×';
  });

  document.getElementById('ctrl-toggle').addEventListener('click', () => {
    document.getElementById('ctrl-panel').classList.toggle('open');
  });
</script>

<script>
  let p5Instance = null;
  const loaderEl = document.getElementById('loader');
  const loaderBar = document.getElementById('loader-bar');
  const loaderPct = document.getElementById('loader-pct');
  let loadingTimerDone = false;
  let p5LoadingDone = false;

  function checkReady() {
    if (loadingTimerDone && p5LoadingDone) {
      if (p5Instance) p5Instance.startExperience();
      loaderEl.classList.add('fade');
      tentarTocarAudio();
      if(audioIniciado) iniciarFlashes();
    }
  }

  setTimeout(() => { loadingTimerDone = true; checkReady(); }, 2500);

  const sketch = function(p) {
    const BUF_W = 680, BUF_H = 680;
    let buf;
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*'.split('');
    let ctx;
    let elements = [];
    let curEl = 0;
    let phase = 'growing';
    let phaseT = 0;
    let bloom = 0, bloomTarget = 1, lastBloom = -1;
    let renderMode = 0, prevMode = 0, modeT = 1;

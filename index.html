<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotus</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.3/p5.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }

    canvas { display: block; }

    #canvas-container { width: 100%; height: 100%; }

    #loader {
      position: fixed;
      inset: 0;
      z-index: 999;
      background: #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      transition: opacity 0.8s ease;
    }

    #loader.fade { opacity: 0; pointer-events: none; }

    #loader .title {
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      letter-spacing: 4px;
      opacity: 0.7;
      margin-bottom: 24px;
    }

    #loader .bar-bg {
      width: 180px;
      height: 3px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    #loader .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #7bbfdd, #b0d8f0);
      transition: width 0.15s;
    }

    #loader .pct {
      color: #555;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      margin-top: 10px;
    }

    #ctrl-toggle {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 100;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.7);
      font-family: 'Courier New', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      padding: 7px 14px;
      cursor: pointer;
      border-radius: 3px;
      transition: background 0.2s;
    }
    #ctrl-toggle:hover { background: rgba(255,255,255,0.15); }

    #ctrl-panel {
      position: fixed;
      bottom: 58px;
      right: 20px;
      z-index: 100;
      background: rgba(0,0,0,0.82);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 6px;
      padding: 18px 20px 14px;
      width: 240px;
      display: none;
      font-family: 'Courier New', monospace;
    }
    #ctrl-panel.open { display: block; }

    #ctrl-panel .ctrl-title {
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      letter-spacing: 3px;
      margin-bottom: 16px;
    }

    #ctrl-panel .ctrl-row { margin-bottom: 13px; }

    #ctrl-panel .ctrl-label {
      display: flex;
      justify-content: space-between;
      color: rgba(255,255,255,0.5);
      font-size: 10px;
      letter-spacing: 1px;
      margin-bottom: 5px;
    }
    #ctrl-panel .ctrl-label span { color: rgba(255,200,220,0.9); }

    #ctrl-panel input[type=range] {
      -webkit-appearance: none;
      width: 100%;
      height: 2px;
      background: rgba(255,255,255,0.15);
      outline: none;
      border-radius: 1px;
      cursor: pointer;
    }
    #ctrl-panel input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,180,210,0.9);
      cursor: pointer;
    }
    #ctrl-panel input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px;
      border-radius: 50%;
      background: rgba(255,180,210,0.9);
      border: none; cursor: pointer;
    }
    #ctrl-panel hr {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.08);
      margin: 14px 0;
    }
    #ctrl-panel .ctrl-reset {
      width: 100%;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      padding: 5px;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s;
    }
    #ctrl-panel .ctrl-reset:hover {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.7);
    }
  </style>
</head>
<body>

  <div id="canvas-container"></div>

  <div id="loader">
    <div class="title">LOADING</div>
    <div class="bar-bg">
      <div class="bar-fill" id="loader-bar"></div>
    </div>
    <div class="pct" id="loader-pct">0%</div>
  </div>

  <button id="ctrl-toggle">CONTROLS</button>

  <div id="ctrl-panel">
    <div class="ctrl-title">CONTROLS</div>

    <div class="ctrl-row">
      <div class="ctrl-label">ROTAÇÃO <span id="lbl-rot">1.0×</span></div>
      <input type="range" id="sl-rot" min="0" max="3" step="0.05" value="1">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">ABERTURA <span id="lbl-bloom">1.0×</span></div>
      <input type="range" id="sl-bloom" min="0.1" max="4" step="0.05" value="1">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">MURCHA <span id="lbl-wilt">1.0×</span></div>
      <input type="range" id="sl-wilt" min="0.1" max="4" step="0.05" value="1">
    </div>

    <hr>

    <div class="ctrl-row">
      <div class="ctrl-label">TROCA DE MODO <span id="lbl-mode">3.5s</span></div>
      <input type="range" id="sl-mode" min="0.3" max="12" step="0.1" value="3.5">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">FREQ. GLITCH <span id="lbl-glitch">1.0×</span></div>
      <input type="range" id="sl-glitch" min="0.1" max="4" step="0.05" value="1">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">ONDAS / OSC. <span id="lbl-wave">1.0×</span></div>
      <input type="range" id="sl-wave" min="0.1" max="4" step="0.05" value="1">
    </div>
    <div class="ctrl-row">
      <div class="ctrl-label">INFLUÊNCIA MOUSE <span id="lbl-mouse">1.0×</span></div>
      <input type="range" id="sl-mouse" min="0" max="4" step="0.05" value="1">
    </div>

    <hr>

    <button class="ctrl-reset" id="btn-reset">RESETAR</button>
  </div>

  <script>
    // Global config object — read by the p5 sketch each frame
    const cfg = {
      rotSpeed:    1.0,
      bloomSpeed:  1.0,
      wiltSpeed:   1.0,
      modeInterval:3.5,
      glitchFreq:  1.0,
      waveSpeed:   1.0,
      mouseInfluence: 1.0
    };

    const defaults = { ...cfg };

    function bindSlider(id, lblId, key, fmt) {
      const sl  = document.getElementById(id);
      const lbl = document.getElementById(lblId);
      sl.addEventListener('input', () => {
        cfg[key] = parseFloat(sl.value);
        lbl.textContent = fmt(cfg[key]);
      });
    }

    bindSlider('sl-rot',    'lbl-rot',    'rotSpeed',      v => v.toFixed(1) + '×');
    bindSlider('sl-bloom',  'lbl-bloom',  'bloomSpeed',    v => v.toFixed(1) + '×');
    bindSlider('sl-wilt',   'lbl-wilt',   'wiltSpeed',     v => v.toFixed(1) + '×');
    bindSlider('sl-mode',   'lbl-mode',   'modeInterval',  v => v.toFixed(1) + 's');
    bindSlider('sl-glitch', 'lbl-glitch', 'glitchFreq',    v => v.toFixed(1) + '×');
    bindSlider('sl-wave',   'lbl-wave',   'waveSpeed',     v => v.toFixed(1) + '×');
    bindSlider('sl-mouse',  'lbl-mouse',  'mouseInfluence',v => v.toFixed(1) + '×');

    document.getElementById('btn-reset').addEventListener('click', () => {
      Object.assign(cfg, defaults);
      document.getElementById('sl-rot').value    = defaults.rotSpeed;
      document.getElementById('sl-bloom').value  = defaults.bloomSpeed;
      document.getElementById('sl-wilt').value   = defaults.wiltSpeed;
      document.getElementById('sl-mode').value   = defaults.modeInterval;
      document.getElementById('sl-glitch').value = defaults.glitchFreq;
      document.getElementById('sl-wave').value   = defaults.waveSpeed;
      document.getElementById('sl-mouse').value  = defaults.mouseInfluence;
      document.getElementById('lbl-rot').textContent    = defaults.rotSpeed.toFixed(1) + '×';
      document.getElementById('lbl-bloom').textContent  = defaults.bloomSpeed.toFixed(1) + '×';
      document.getElementById('lbl-wilt').textContent   = defaults.wiltSpeed.toFixed(1) + '×';
      document.getElementById('lbl-mode').textContent   = defaults.modeInterval.toFixed(1) + 's';
      document.getElementById('lbl-glitch').textContent = defaults.glitchFreq.toFixed(1) + '×';
      document.getElementById('lbl-wave').textContent   = defaults.waveSpeed.toFixed(1) + '×';
      document.getElementById('lbl-mouse').textContent  = defaults.mouseInfluence.toFixed(1) + '×';
    });

    document.getElementById('ctrl-toggle').addEventListener('click', () => {
      document.getElementById('ctrl-panel').classList.toggle('open');
    });
  </script>

  <script>
    let p5Instance = null;

    const loaderEl  = document.getElementById('loader');
    const loaderBar = document.getElementById('loader-bar');
    const loaderPct = document.getElementById('loader-pct');

    let loadingTimerDone = false;
    let p5LoadingDone    = false;

    function checkReady() {
      if (loadingTimerDone && p5LoadingDone) {
        if (p5Instance) p5Instance.startExperience();
        loaderEl.classList.add('fade');
      }
    }

    setTimeout(() => { loadingTimerDone = true; checkReady(); }, 2500);

    const sketch = function(p) {
      const BUF_W = 680, BUF_H = 680;
      let buf;
      const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%&*'.split('');
      let ctx;

      let elements = [];
      let curEl    = 0;

      let phase  = 'growing';
      let phaseT = 0;

      let bloom       = 0;
      let bloomTarget = 1;
      let lastBloom   = -1;

      let renderMode = 0, prevMode = 0, modeT = 1;

      let grid = 4, gridTarget = 4;
      const GRID_MIN = 4, GRID_MAX = 20;
      let densDir = 1, densTimer = 0;

      let mInfX = 0, mInfY = 0;
      let t = 0;

      let rotX = 0, rotY = 0, rotZ = 0;
      let autoRotX = 0, autoRotY = 0, autoRotZ = 0;
      let mouseRotX = 0, mouseRotY = 0;
      let targetMouseRotX = 0, targetMouseRotY = 0;
      let rotEaseIn = 0;

      let loadingPhase = true;
      let warmFrames   = 0;
      const WARM_TARGET = 60;

      let glitchTimer     = 0;
      let glitchActive    = false;
      let glitchIntensity = 0;
      let glitchSlices    = [];

      let wilt     = 0;
      let lastWilt = -1;

      const easeInOutCubic = x => x < 0.5 ? 4*x*x*x : 1 - p.pow(-2*x+2, 3) / 2;
      const easeOutQuart   = x => 1 - p.pow(1 - x, 4);

      p.setup = function() {
        p.createCanvas(p.windowWidth, p.windowHeight);
        p.pixelDensity(1);
        p.textFont('Courier New, monospace');
        p.textAlign(p.CENTER, p.CENTER);
        p.noStroke();

        buf = p.createGraphics(BUF_W, BUF_H);
        buf.pixelDensity(1);
        buf.noSmooth();
        buf.canvas.getContext('2d', { willReadFrequently: true });

        ctx = p.drawingContext;

        // Lotus color variants — soft pinks, whites, deep magentas
        elements = [
          { c1:[230,170,190], c2:[255,240,245], c3:[180,80,120],  stemC:[40,110,60],  layers:10, petalsPerLayer:7,  maxRadius:148, ruffleAmt:4,  sepals:5, receptacleR:28 },
          { c1:[255,200,215], c2:[255,245,250], c3:[200,100,140], stemC:[38,105,58],  layers:11, petalsPerLayer:8,  maxRadius:142, ruffleAmt:3,  sepals:6, receptacleR:30 },
          { c1:[210,140,180], c2:[250,225,240], c3:[150,50,100],  stemC:[42,112,62],  layers:10, petalsPerLayer:7,  maxRadius:152, ruffleAmt:5,  sepals:5, receptacleR:26 },
        ];

        startElement(0);
      };

      function startElement(idx) {
        curEl       = idx;
        bloom       = 0;
        bloomTarget = 1;
        lastBloom   = -1;
        lastWilt    = -1;
        wilt        = 0;
        phase       = 'growing';
        phaseT      = 0;
        grid        = GRID_MIN;
        gridTarget  = GRID_MIN;
        densDir     = 1;
        densTimer   = 0;
        modeT       = 1;
      }

      p.startExperience = function() {
        loadingPhase = false;
      };

      p.draw = function() {
        const dt = p.deltaTime / 1000;
        const f  = elements[curEl];

        if (loadingPhase) {
          p.background(0);
          bloom = p.min(0.5, warmFrames / WARM_TARGET * 0.5);
          drawFlowerToBuffer(f, bloom, 0);
          warmFrames++;
          const pct = p.min(100, p.floor(warmFrames / WARM_TARGET * 100));
          if (loaderBar) loaderBar.style.width = pct + '%';
          if (loaderPct) loaderPct.textContent  = pct + '%';
          if (warmFrames >= WARM_TARGET) {
            p5LoadingDone = true;
            checkReady();
          }
          return;
        }

        p.background(0);
        t += 0.006 * cfg.waveSpeed;

        rotEaseIn = p.min(1, rotEaseIn + dt * 0.08);
        const re = easeInOutCubic(rotEaseIn);

        autoRotY += dt * 0.10  * re * cfg.rotSpeed;
        autoRotX += dt * 0.04 * p.sin(t * 0.07) * re * cfg.rotSpeed;
        autoRotZ += dt * 0.03 * p.sin(t * 0.04 + 1.5) * re * cfg.rotSpeed;

        targetMouseRotX = (p.mouseY - p.height / 2) / p.height * 1.2;
        targetMouseRotY = (p.mouseX - p.width  / 2) / p.width  * 1.8;
        mouseRotX += (targetMouseRotX - mouseRotX) * 0.02 * cfg.mouseInfluence;
        mouseRotY += (targetMouseRotY - mouseRotY) * 0.02 * cfg.mouseInfluence;

        rotX = autoRotX + mouseRotX * re;
        rotY = autoRotY + mouseRotY * re;
        rotZ = autoRotZ;

        if (phase === 'growing') {
          bloom += (bloomTarget - bloom) * 0.002 * cfg.bloomSpeed;
          phaseT += dt;
          if (bloom > 0.98) { bloom = 1; phase = 'interactive'; phaseT = 0; }
        }

        densTimer += dt;
        if (densTimer > cfg.modeInterval) {
          densTimer = 0;
          triggerGlitch();
          prevMode   = renderMode;
          renderMode = (renderMode + 1) % 3;
          modeT      = 0;
          if (densDir === 1) { gridTarget = GRID_MAX; densDir = -1; }
          else               { gridTarget = GRID_MIN; densDir =  1; }
        }

        if (phase === 'interactive') {
          phaseT += dt;
          if (phaseT > 25) { phase = 'wilting'; phaseT = 0; triggerGlitch(); }
        }

        if (phase === 'wilting') {
          wilt    = p.min(1, wilt + dt * 0.015 * cfg.wiltSpeed);
          phaseT += dt;
          if (wilt > 0.95) { phase = 'waiting'; phaseT = 0; }
        }

        if (phase === 'waiting') {
          phaseT += dt;
          if (phaseT > 0.6) {
            prevMode   = renderMode;
            renderMode = (renderMode + 1) % 3;
            modeT      = 0;
            triggerGlitch();
            startElement((curEl + 1) % elements.length);
          }
        }

        grid  += (gridTarget - grid) * 0.03;
        modeT  = p.min(1, modeT + dt * 1.2);

        updateGlitch(dt);

        if (phase === 'interactive') {
          mInfX += ((p.mouseX - p.width  / 2) * 0.08 - mInfX) * 0.04 * cfg.mouseInfluence;
          mInfY += ((p.mouseY - p.height / 2) * 0.08 - mInfY) * 0.04 * cfg.mouseInfluence;
        } else {
          mInfX *= 0.95;
          mInfY *= 0.95;
        }

        drawFlowerToBuffer(f, bloom, wilt);

        glitchTimer -= dt;
        if (glitchTimer <= 0 && !glitchActive) {
          glitchTimer = p.random(8, 18) / cfg.glitchFreq;
          if (p.random() < 0.4) triggerGlitch();
        }

        renderToScreen();
        drawGlitchOverlay();
        drawFPS();
      };

      function triggerGlitch() {
        glitchActive    = true;
        glitchIntensity = p.random(0.4, 1.0);
        glitchSlices    = [];
        const scaleF = p.min(p.width / BUF_W, p.height / BUF_H) * 0.85;
        const rW = BUF_W * scaleF, rH = BUF_H * scaleF;
        const fOx = (p.width  - rW) / 2 + mInfX;
        const fOy = (p.height - rH) / 2 + mInfY;
        const numSlices = p.floor(p.random(3, 10));
        for (let i = 0; i < numSlices; i++) {
          const sy = p.random(fOy, fOy + rH);
          const sh = p.min(p.random(2, rH * 0.08), fOy + rH - sy);
          glitchSlices.push({
            y: sy, h: sh, fx: fOx, fw: rW,
            offset: p.random(-80, 80) * glitchIntensity,
            colorShift: p.random() < 0.4,
            duration: p.random(0.08, 0.3)
          });
        }
      }

      function updateGlitch(dt) {
        if (!glitchActive) return;
        let allDone = true;
        for (const s of glitchSlices) {
          s.duration -= dt;
          if (s.duration > 0) allDone = false;
          else s.offset *= 0.7;
        }
        if (allDone) { glitchActive = false; glitchSlices = []; }
      }

      function drawGlitchOverlay() {
        if (!glitchActive || !glitchSlices.length) return;
        for (const s of glitchSlices) {
          if (p.abs(s.offset) < 0.5) continue;
          const sx = p.floor(s.fx), sy = p.floor(s.y), sw = p.floor(s.fw), sh = p.floor(s.h);
          if (sw < 1 || sh < 1) continue;
          if (s.colorShift) {
            ctx.save();
            ctx.globalAlpha = 0.7;
            ctx.globalCompositeOperation = 'lighter';
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx + s.offset*1.5, sy, sw, sh);
            ctx.globalAlpha = 0.45;
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx - s.offset, sy, sw, sh);
            ctx.restore();
          } else {
            ctx.drawImage(ctx.canvas, sx, sy, sw, sh, sx + s.offset, sy, sw, sh);
          }
        }
      }

      function drawFlowerToBuffer(f, bl, wl) {
        buf.background(0);
        buf.noStroke();
        wl = wl || 0;
        const stemProgress = p.constrain(bl * 3, 0, 1);
        const flowerBloom  = p.constrain((bl - 0.15) / 0.85, 0, 1);
        const wiltDroop    = wl * 35;
        const flowerCX     = BUF_W / 2;
        const flowerCY     = BUF_H * 0.42 + wiltDroop;
        drawStem(buf, f, stemProgress, wl, flowerCX, flowerCY);
        drawLotus3D(buf, f, flowerBloom, wl, flowerCX, flowerCY);
        buf.loadPixels();
      }

      // Lotus stem: straight, aquatic, with large round floating leaves
      function drawStem(g, f, progress, wl, cx, cy) {
        wl = wl || 0;
        const stemLen   = BUF_H * 0.40;
        const stemX     = BUF_W / 2;
        const stemTop   = cy;
        const stemBot   = stemTop + stemLen;
        const visibleLen = stemLen * easeOutQuart(progress);
        const visibleTop = stemBot - visibleLen;

        // Draw the water surface line
        if (progress > 0.5) {
          const waterY = stemTop + stemLen * 0.65;
          for (let x = stemX - 80; x < stemX + 80; x += 4) {
            const wave = p.sin(x * 0.07 + t * 1.2) * 2.5;
            g.fill(30, 80, 140, 60);
            g.ellipse(x, waterY + wave, 5, 3);
          }
        }

        // Stem — straighter and slightly hollow-looking (lotus stems are tubular)
        for (let y = visibleTop; y < stemBot; y += 3) {
          const tt    = (y - stemTop) / stemLen;
          const sw    = p.lerp(12, 7, tt);
          const wiltB = wl * 25 * (1 - tt) * p.sin((1 - tt) * p.PI);
          const curveX = p.sin(tt * p.PI * 0.15) * 10 + wiltB;
          let r  = p.lerp(f.stemC[0], f.stemC[0] * 0.45, tt);
          let gc = p.lerp(f.stemC[1], f.stemC[1] * 0.55, tt);
          let b  = p.lerp(f.stemC[2], f.stemC[2] * 0.45, tt);
          if (wl > 0) {
            r  = p.lerp(r,  r  * 0.4 + 25, wl * 0.5);
            gc = p.lerp(gc, gc * 0.35 + 20, wl * 0.5);
            b  = p.lerp(b,  b  * 0.3 + 8,  wl * 0.5);
          }
          g.fill(r, gc, b);
          g.ellipse(stemX + curveX, y, sw, 4);
          // Highlight stripe on stem
          g.fill(r * 1.5, gc * 1.5, b * 1.3, 45);
          g.ellipse(stemX + curveX - 1.5, y, sw * 0.25, 2.5);
        }

        // Large lily pad leaves (characteristic of lotus)
        if (progress > 0.25) {
          const lp = p.constrain((progress - 0.25) / 0.5, 0, 1);
          const ly = stemTop + stemLen * 0.60;
          const lx = stemX - 12;
          drawLilyPad(g, lx, ly, -1, 72 * lp, f.stemC, wl);
        }
        if (progress > 0.45) {
          const lp = p.constrain((progress - 0.45) / 0.45, 0, 1);
          const ly = stemTop + stemLen * 0.72;
          const lx = stemX + 14;
          drawLilyPad(g, lx, ly, 1, 58 * lp, f.stemC, wl);
        }
        if (progress > 0.65) {
          const lp = p.constrain((progress - 0.65) / 0.35, 0, 1);
          const ly = stemTop + stemLen * 0.55;
          const lx = stemX + 5;
          drawLilyPad(g, lx, ly, 0.4, 42 * lp, f.stemC, wl);
        }
      }

      // Flat round lily pad (lotus leaf) — nearly circular with a radial notch
      function drawLilyPad(g, x, y, side, sz, sc, wl) {
        if (sz < 3) return;
        wl = wl || 0;
        g.push();
        g.translate(x, y);
        g.rotate(side * 0.3);
        // Squish a bit for perspective
        g.scale(1.0, 0.38);

        let gr = sc[1] * (wl > 0 ? 0.5 + 0.3 * (1 - wl) : 1.05);
        let rr = sc[0] * (wl > 0 ? 0.7 + 0.2 * (1 - wl) : 0.75);
        let br = sc[2] * (wl > 0 ? 0.4 : 0.65);

        // Pad body
        g.fill(rr, gr, br, 210);
        g.beginShape();
        const notchAng = p.PI * 0.15;
        for (let a = notchAng; a <= p.TWO_PI + notchAng; a += 0.12) {
          const distortion = 1 + p.sin(a * 6) * 0.04;
          g.vertex(p.cos(a) * sz * distortion, p.sin(a) * sz * distortion);
        }
        g.endShape(p.CLOSE);

        // Notch (the slit characteristic of lily pads)
        g.fill(0, 0, 0, 0);
        g.stroke(0, 0, 0, 80);
        g.strokeWeight(1.0);
        g.line(0, 0, sz * 0.55, -sz * 0.05);

        // Radial veins
        g.stroke(rr * 1.3, gr * 1.4, br * 1.2, 65);
        g.strokeWeight(0.7);
        for (let i = 0; i < 8; i++) {
          const va = (p.TWO_PI / 8) * i + notchAng;
          g.line(0, 0, p.cos(va) * sz * 0.88, p.sin(va) * sz * 0.88);
        }
        // Sheen highlight
        g.noStroke();
        g.fill(rr * 1.6, gr * 1.6, br * 1.5, 35);
        g.ellipse(-sz * 0.22, -sz * 0.18, sz * 0.45, sz * 0.3);
        g.noStroke();
        g.pop();
      }

      function rot3D(x, y, z) {
        const cY = p.cos(rotY), sY = p.sin(rotY);
        const rx  = x*cY + z*sY;
        const rz  = -x*sY + z*cY;
        const cX  = p.cos(rotX), sX = p.sin(rotX);
        const ry  = y*cX - rz*sX;
        const rz2 = y*sX + rz*cX;
        const cZ  = p.cos(rotZ), sZ = p.sin(rotZ);
        const fx  = rx*cZ - ry*sZ;
        const fy  = rx*sZ + ry*cZ;
        return [fx, fy, rz2];
      }

      // Lotus petal: tall, pointed, slightly concave tip — drawn as a narrow elongated shape
      function drawLotusPetal(g, it) {
        if (!it.pw || it.pw < 0.5) return;
        g.push();
        g.translate(it.sx, it.sy);
        g.rotate(it.sa);
        g.fill(it.r, it.gr, it.b);

        const pl  = it.pl;
        const pw  = it.pw;
        const rAmt = it.rAmt;
        const rPh  = it.rPhase;
        const cup  = it.cup || 0;

        // Lotus petals are narrow at base, widest around 40%, pointed at tip
        g.beginShape();
        // Right edge: base → widest point → tip
        for (let tt = 0; tt <= 1; tt += 0.06) {
          const px   = tt * pl;
          // envelope: narrows near 0 and near 1, peak near 0.40
          const env  = p.sin(tt * p.PI * 0.95) * p.pow(1 - tt * 0.55, 1.1);
          const bW   = env * pw;
          const cupC = p.sin(tt * p.PI) * cup * pw * 0.55;
          const ruf  = p.sin(tt * 5 + rPh) * rAmt * tt * (1 - tt);
          g.vertex(px, bW + ruf + cupC);
        }
        // Left edge: tip → widest → base
        for (let tt = 1; tt >= 0; tt -= 0.06) {
          const px   = tt * pl;
          const env  = p.sin(tt * p.PI * 0.95) * p.pow(1 - tt * 0.55, 1.1);
          const bW   = env * pw;
          const cupC = p.sin(tt * p.PI) * cup * pw * 0.35;
          const ruf  = p.sin(tt * 5 + rPh + p.PI) * rAmt * tt * (1 - tt);
          g.vertex(px, -bW + ruf - cupC);
        }
        g.endShape(p.CLOSE);

        // Central vein highlight
        g.fill(it.r * 1.35, it.gr * 1.35, it.b * 1.2, 55);
        g.beginShape();
        for (let tt = 0.05; tt <= 0.95; tt += 0.1) {
          const px = tt * pl;
          const hw = p.sin(tt * p.PI * 0.95) * pw * 0.12;
          g.vertex(px, hw);
        }
        for (let tt = 0.95; tt >= 0.05; tt -= 0.1) {
          const px = tt * pl;
          const hw = p.sin(tt * p.PI * 0.95) * pw * 0.12;
          g.vertex(px, -hw);
        }
        g.endShape(p.CLOSE);

        g.pop();
      }

      function drawLotus3D(g, f, bl, wl, cx, cy) {
        wl = wl || 0;
        const focal    = 420;
        const wiltTilt = wl * 0.14;
        const cosW = p.cos(wiltTilt), sinW = p.sin(wiltTilt);
        const items = [];

        // Sepals (green, close in tight around bud, open wide as flower blooms)
        if (f.sepals && bl < 0.75) {
          const numS    = f.sepals;
          const openAng = easeInOutCubic(bl) * p.HALF_PI * 0.85;
          let sepalAlpha = p.map(p.constrain(bl, 0, 0.75), 0, 0.75, 255, 0);
          if (wl) sepalAlpha *= (1 - wl);
          if (sepalAlpha > 5) {
            for (let i = 0; i < numS; i++) {
              const a     = (p.TWO_PI / numS) * i;
              const sTilt = p.HALF_PI * 0.3 - openAng;
              const dist  = 44;
              const ct = p.cos(sTilt), st = p.sin(sTilt);
              const x3 = p.cos(a)*dist*ct, z3 = p.sin(a)*dist*ct, y3 = -st*dist;
              const [rx, ry, rz] = rot3D(x3, y3, z3);
              const ps     = focal / (focal + rz);
              const sepAng = p.atan2(ry, rx);
              const fv     = p.max(focal / (focal + p.abs(rz)), 0.15);
              items.push({ rz, tp:'s', sx:rx*ps, sy:ry*ps, sa:sepAng,
                sLen:72*ps, sW:18*ps*fv, sAlpha:sepalAlpha, sc:f.stemC });
            }
          }
        }

        // Receptacle (seed pod center) — prominent flat-topped cone, very characteristic of lotus
        const cAlpha = p.constrain((bl - 0.35) / 0.35, 0, 1) * (1 - wl);
        if (cAlpha > 0) items.push({ rz:0, tp:'c', sx:0, sy:0, sa:0, alpha:cAlpha, recR: f.receptacleR || 28 });

        // Petals — lotus has wider-spaced layers, petals more upright and pointed
        for (let layer = f.layers; layer >= 0; layer--) {
          const lr         = layer / f.layers;
          const layerDelay = (1 - lr) * 0.30;
          const layerBl    = p.constrain((bl - layerDelay) / (1 - layerDelay), 0, 1);
          const ebl        = easeInOutCubic(layerBl);
          if (ebl < 0.01) continue;
          const layerFall = p.constrain((wl * 1.4 - (1 - lr) * 0.4) / 0.6, 0, 1);
          if (layerFall > 0.9) continue;

          const innerBoost = (1 - lr);
          // Lotus: fewer petals, more ordered
          const np = f.petalsPerLayer + p.floor(layer * 1.2) + p.floor(innerBoost * 3);
          const baseR = p.lerp(12, f.maxRadius, lr);
          // Lotus petals stand more upright — smaller tilt angle
          let tiltAngle = p.lerp(p.PI * 0.30, p.PI * 0.03, ebl) + layerFall * p.PI * 0.18;
          tiltAngle -= innerBoost * 0.10 * ebl;
          const cosTilt = p.cos(tiltAngle), sinTilt = p.sin(tiltAngle);

          for (let i = 0; i < np; i++) {
            const petalHash = ((i * 73 + layer * 137) & 0xFF) / 255;
            if (wl > 0.1 && petalHash < (wl - 0.1) * 1.3) continue;
            let angle = (p.TWO_PI / np) * i + layer * 0.38 + p.sin(layer * 1.8) * 0.08;
            angle += petalHash * 0.10;
            const droopAmt = layerFall * 0.45 * (0.4 + lr * 0.6);
            const shrink   = 1 - layerFall * 0.30;
            const dist     = baseR * ebl * (0.30 + lr * 0.22);
            let x3 = p.cos(angle)*dist*cosTilt, z3 = p.sin(angle)*dist*cosTilt, y3 = -sinTilt*dist + droopAmt*22;
            if (wiltTilt > 0.001) {
              const ny = y3*cosW - x3*sinW*0.3;
              x3 = x3 + y3*sinW*0.3; y3 = ny;
            }
            const [rx, ry, rz] = rot3D(x3, y3, z3);
            const ps          = focal / (focal + rz);
            const sx          = rx * ps, sy = ry * ps;
            const viewAngle   = p.atan2(ry, rx);
            const depthFactor = focal / (focal + p.abs(rz));
            const faceVis     = p.max(depthFactor, 0.12);
            const nx3 = p.cos(angle)*cosTilt, ny3 = -sinTilt, nz3 = p.sin(angle)*cosTilt;
            const [,,lnz] = rot3D(nx3, ny3, nz3);
            const lightDot = p.constrain(-lnz, -1, 1);
            const lightMod = p.map(lightDot, -1, 1, 0.30, 1.30);
            const cupFactor = (1 - lr) * (1 - ebl * 0.45) * 0.28;

            // Lotus petals: taller and narrower than peony
            const pl = baseR * (0.22 + 0.78*ebl) * (1.30 + innerBoost*0.25) * shrink * ps;
            let pw   = baseR * (0.12 + 0.88*ebl) * 0.38 * shrink * ps * faceVis;
            pw *= (1 + cupFactor);

            const rPhase = i*1.5 + layer*0.8;
            // Lotus: very subtle ruffle (smooth petals)
            const rAmt = f.ruffleAmt * ebl * (0.5 + layerFall * 1.2 + innerBoost * 0.3) * ps;

            const lA = p.sin(angle + layer*0.5);
            const dM = p.map(layer, 0, f.layers, 0.38, 1.0);
            const bB = 0.42 + 0.58*ebl;
            const cm = p.map(lA, -1, 1, 0.48, 1.18) * dM * bB * lightMod;

            // Color: tips are lighter/whiter, base is deeper pink
            const tipBlend = p.pow(lr, 0.7);
            let r  = p.constrain(p.lerp(f.c1[0], f.c2[0], tipBlend) * cm, 0, 255);
            let gr = p.constrain(p.lerp(f.c1[1], f.c2[1], tipBlend) * cm, 0, 255);
            let b  = p.constrain(p.lerp(f.c1[2], f.c2[2], tipBlend) * cm, 0, 255);
            if (wl > 0) {
              const wf = p.min(1, layerFall * 1.3);
              r  = p.lerp(r,  r  * 0.5 + 50, wf);
              gr = p.lerp(gr, gr * 0.3 + 25, wf);
              b  = p.lerp(b,  b  * 0.15 + 8,  wf);
            }
            items.push({ rz, tp:'p', sx, sy, sa:viewAngle, pl, pw, rPhase, rAmt, r, gr, b, cup:cupFactor });
          }
        }

        items.sort((a, b) => a.rz - b.rz);

        for (const it of items) {
          if (it.tp === 'c') {
            // Lotus receptacle: flat-topped conical seed pod (the iconic green disc with holes)
            g.push();
            g.translate(cx, cy);
            const [cnx, cny, cnz] = rot3D(0, -1, 0);
            const cps = focal / (focal + cnz * 12);
            const csx = cnx * 12 * cps, csy = cny * 12 * cps;
            const recR = it.recR || 28;

            // Pod body — layered ellipses for the flat-top cone
            for (let r = recR; r > 0; r -= 3.5) {
              const ratio = r / recR;
              const ySink = (1 - ratio) * 4 * cps;
              g.fill(
                p.lerp(40,  90,  ratio) * (it.alpha || 1),
                p.lerp(100, 160, ratio) * (it.alpha || 1),
                p.lerp(40,  80,  ratio) * (it.alpha || 1)
              );
              g.ellipse(csx, csy + ySink, r * 2.1 * cps, r * 0.85 * cps);
            }

            // Seed holes on top of the receptacle
            if (bl > 0.55) {
              const sa2 = p.constrain((bl - 0.55) / 0.30, 0, 1) * (1 - wl);
              const holeCount = 10;
              for (let i = 0; i < holeCount; i++) {
                const ha  = (p.TWO_PI / holeCount) * i;
                const hd  = recR * 0.52 * cps;
                const hx  = csx + p.cos(ha) * hd;
                const hy  = csy + p.sin(ha) * hd * 0.42;
                const hr  = 3.5 * cps * sa2;
                g.fill(20, 55, 20, 200 * sa2);
                g.ellipse(hx, hy, hr * 2, hr * 1.3);
              }
              // Center holes
              for (let i = 0; i < 3; i++) {
                const ha = (p.TWO_PI / 3) * i;
                const hd = recR * 0.2 * cps;
                g.fill(20, 55, 20, 180 * sa2);
                g.ellipse(csx + p.cos(ha)*hd, csy + p.sin(ha)*hd*0.4, 3*cps*sa2, 2.2*cps*sa2);
              }
            }

            // Yellow stamens ring around receptacle
            if (bl > 0.50) {
              const sa3 = p.constrain((bl - 0.50) / 0.30, 0, 1) * (1 - wl);
              for (let i = 0; i < 28; i++) {
                const a  = (p.TWO_PI / 28) * i;
                const d  = recR * 0.85 + (i % 4) * 2.8;
                const stX = p.cos(a)*d*cps, stZ = p.sin(a)*d*cps*0.35, stY = -4;
                const [srx, sry, srz] = rot3D(stX, stY, stZ);
                const stP = focal / (focal + srz);
                // Stamen filament
                g.fill(245, 220, 60, 130 * sa3);
                g.ellipse(csx + srx*stP, csy + sry*stP, 1.8*stP, 1.8*stP);
                // Anther tip
                g.fill(255, 240, 80, 160 * sa3);
                g.ellipse(csx + srx*stP, csy + sry*stP - 1.5*stP, 2.8*stP, 2.8*stP);
              }
            }
            g.pop();

          } else if (it.tp === 's') {
            if (!it.sW || it.sW < 1) continue;
            g.push();
            g.translate(cx + it.sx, cy + it.sy);
            g.rotate(it.sa);
            // Lotus sepals: narrower and more pointed than peony
            g.fill(it.sc[0]*0.65, it.sc[1]*0.95, it.sc[2]*0.55, it.sAlpha);
            g.beginShape();
            g.vertex(0, 0);
            g.bezierVertex(it.sLen*0.25, -it.sW*0.5, it.sLen*0.65, -it.sW*0.3, it.sLen, 0);
            g.bezierVertex(it.sLen*0.65,  it.sW*0.3,  it.sLen*0.25,  it.sW*0.5, 0, 0);
            g.endShape(p.CLOSE);
            g.pop();

          } else {
            drawLotusPetal(g.push ? g : buf, it);
            // Because drawLotusPetal uses its own push/pop we need to translate manually
            // Fix: inline the petal draw
            if (!it.pw || it.pw < 0.5) continue;
            buf.push();
            buf.translate(cx + it.sx, cy + it.sy);
            buf.rotate(it.sa);
            buf.fill(it.r, it.gr, it.b);
            const pl  = it.pl, pw  = it.pw;
            const rAmt = it.rAmt, rPh = it.rPhase;
            const cup  = it.cup || 0;
            buf.beginShape();
            for (let tt = 0; tt <= 1; tt += 0.065) {
              const px  = tt * pl;
              const env = p.sin(tt * p.PI * 0.95) * p.pow(1 - tt * 0.55, 1.1);
              const bW  = env * pw;
              const cupC = p.sin(tt * p.PI) * cup * pw * 0.55;
              const ruf = p.sin(tt * 5 + rPh) * rAmt * tt * (1 - tt);
              buf.vertex(px, bW + ruf + cupC);
            }
            for (let tt = 1; tt >= 0; tt -= 0.065) {
              const px  = tt * pl;
              const env = p.sin(tt * p.PI * 0.95) * p.pow(1 - tt * 0.55, 1.1);
              const bW  = env * pw;
              const cupC = p.sin(tt * p.PI) * cup * pw * 0.35;
              const ruf = p.sin(tt * 5 + rPh + p.PI) * rAmt * tt * (1 - tt);
              buf.vertex(px, -bW + ruf - cupC);
            }
            buf.endShape(p.CLOSE);
            // Vein
            buf.fill(it.r * 1.35, it.gr * 1.35, it.b * 1.2, 52);
            buf.beginShape();
            for (let tt = 0.05; tt <= 0.92; tt += 0.1) {
              const px = tt * pl;
              const hw = p.sin(tt * p.PI * 0.95) * pw * 0.11;
              buf.vertex(px, hw);
            }
            for (let tt = 0.92; tt >= 0.05; tt -= 0.1) {
              const px = tt * pl;
              const hw = p.sin(tt * p.PI * 0.95) * pw * 0.11;
              buf.vertex(px, -hw);
            }
            buf.endShape(p.CLOSE);
            buf.pop();
          }
        }
      }

      function renderToScreen() {
        const px      = buf.pixels;
        const g       = p.max(4, p.round(grid));
        const asciiG  = p.max(g, 6);
        const scaleF  = p.min(p.width / BUF_W, p.height / BUF_H) * 0.85;
        const invScale = 1 / scaleF;
        const renderW = BUF_W * scaleF, renderH = BUF_H * scaleF;
        const ox = (p.width  - renderW) / 2 + mInfX;
        const oy = (p.height - renderH) / 2 + mInfY;
        const curM         = renderMode, prevM = prevMode, mt = modeT;
        const transitionDone = mt >= 0.99;
        const useNative    = (curM === 0) || (!transitionDone && prevM === 0);
        if (useNative) { ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; }
        const gEff  = (curM === 0 && transitionDone) ? asciiG : g;
        const halfG = gEff * 0.5;
        const yStart = p.max(0, p.floor(oy / gEff) * gEff);
        const yEnd   = p.min(p.height, oy + renderH);
        const xStart = p.max(0, p.floor(ox / gEff) * gEff);
        const xEnd   = p.min(p.width, ox + renderW);
        const asciiSize = gEff * 1.1;
        let lastFontStr = '';

        for (let sy = yStart; sy < yEnd; sy += gEff) {
          const byBase = p.floor((sy - oy) * invScale);
          if (byBase < 0 || byBase >= BUF_H) continue;
          const rowOff = byBase * BUF_W;
          for (let sx = xStart; sx < xEnd; sx += gEff) {
            const bx = p.floor((sx - ox) * invScale);
            if (bx < 0 || bx >= BUF_W) continue;
            const idx = (rowOff + bx) * 4;
            const r = px[idx], gr = px[idx+1], b = px[idx+2];
            if ((r + gr + b) < 12) continue;
            const bright = r*0.299 + gr*0.587 + b*0.114;
            const cx = sx + halfG, cy = sy + halfG;
            let mode;
            if (transitionDone) {
              mode = curM;
            } else {
              const hash = ((sx*73 + sy*137) & 0xFF) * 0.00392;
              mode = hash < mt ? curM : prevM;
            }
            if (mode === 0) {
              const fontSz  = p.floor(asciiSize * (0.4 + bright * 0.004));
              const fontStr = fontSz + 'px Courier New';
              if (fontStr !== lastFontStr) { ctx.font = fontStr; lastFontStr = fontStr; }
              ctx.fillStyle = 'rgb(' + r + ',' + gr + ',' + b + ')';
              const ci = ((bright >> 2) + ((sx*7 + sy*13) >> 3)) % chars.length;
              ctx.fillText(chars[ci], cx, cy);
            } else if (mode === 1) {
              p.fill(r, gr, b);
              const d = gEff * (0.1 + bright * 0.0033);
              p.ellipse(cx, cy, d, d);
            } else {
              p.fill(r, gr, b);
              p.rectMode(p.CENTER);
              p.rect(cx, cy, gEff*0.93, gEff*0.93);
            }
          }
        }
      }

      function drawFPS() {
        p.fill(255, 255, 255, 40);
        p.textSize(9);
        p.textAlign(p.LEFT, p.TOP);
        p.text(p.floor(p.frameRate()) + ' fps', 10, 10);
        p.textAlign(p.CENTER, p.CENTER);
      }

      p.mousePressed = function() {
        if (loadingPhase) return;
        triggerGlitch();
      };

      p.keyPressed = function() {
        if (p.key === 'f' || p.key === 'F') { const fs = p.fullscreen(); p.fullscreen(!fs); }
        if (p.key === 'g' || p.key === 'G') triggerGlitch();
      };

      p.windowResized = function() {
        p.resizeCanvas(p.windowWidth, p.windowHeight);
      };
    };

    p5Instance = new p5(sketch, document.getElementById('canvas-container'));
  </script>
</body>
